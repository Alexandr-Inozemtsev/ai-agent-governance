policy_version: "1.0"
project_id: streamiq
project_name: "StreamIQ"
repository: "C:/Projects/StreamIQ"
domain_policy: "domains/analytics-platform-policy.yaml"
trello_board: "<StreamIQ board URL>"
allowed_agents: [ai-product-orchestrator, ai-business-analyst, ai-system-analyst, ai-data-metrics-engineer, ai-backend-developer, ai-frontend-developer, ai-database-engineer, ai-security-engineer, ai-qa-engineer, ai-trello-analyst, ai-release-manager, ai-code-reviewer]
disabled_agents: []
security_notes:
  - "Dashboards with user/company data require security review."
llm_notes:
  - "LLM summaries disabled unless separate AI/RAG policy is attached."
backend_frontend_data_notes:
  - "Metric definitions require data owner and product approval."
  - "Data pipelines require data quality gates."
blocked_actions_extra:
  - "публиковать dashboard с sensitive data без review"
bug_rules:
  can_create_bug_reports: true
  can_create_trello_bug_cards: false
  bug_card_requires_parent_epic: true
  epic_card_must_track_open_bugs: true
  allowed_bug_lists: ["07 QA / проверка", "09 Заблокировано", "Баги"]
  required_bug_labels: ["Баг", "QA", "Analytics", "Data", "Backend", "Frontend"]
  bug_id_format: "БАГ-ЭПИК-{epic_number}-{sequence}"
  requires_security_review_for_security_bug: true
