policy_version: "1.0"
project_id: gaming-platform
project_name: "gaming_platform"
repository: "C:/Projects/gaming_platform"
domain_policy: "domains/game-platform-policy.yaml"
trello_board: "<gaming_platform board URL>"
allowed_agents: [ai-product-orchestrator, ai-system-analyst, ai-solution-architect, ai-frontend-developer, ai-backend-developer, ai-security-engineer, ai-qa-engineer, ai-test-automation-engineer, ai-performance-engineer, ai-monetization-strategist, ai-trello-analyst, ai-release-manager]
disabled_agents: []
security_notes:
  - "Payments/store/multiplayer changes require security review."
llm_notes:
  - "LLM usage disabled unless project policy explicitly enables it."
backend_frontend_data_notes:
  - "Game economy changes are product/monetization drafts until orchestrator approval."
  - "Performance gate required for release-impacting gameplay changes."
blocked_actions_extra:
  - "изменить production pricing без approval"
  - "изменить payment code без security review"
bug_rules:
  can_create_bug_reports: true
  can_create_trello_bug_cards: false
  bug_card_requires_parent_epic: true
  epic_card_must_track_open_bugs: true
  allowed_bug_lists: ["07 QA / проверка", "09 Заблокировано", "Regression", "Hotfix"]
  required_bug_labels: ["Баг", "QA", "Gameplay", "Performance", "Backend", "Frontend"]
  bug_id_format: "БАГ-ЭПИК-{epic_number}-{sequence}"
  requires_release_review_for_release_blocker: true
test_automation_rules:
  owner: ai-test-automation-engineer
  qa_gate_owner: ai-qa-engineer
  can_modify_test_code: true
  can_modify_production_code: false
  allowed_test_types: [unit, integration, API, e2e, mocks, regression]
  bug_report_on_failed_automation: true
  cannot_close_bug_without_qa_verification: true
  cannot_change_scope: true
  ci_test_changes_require_devops_approval: true
