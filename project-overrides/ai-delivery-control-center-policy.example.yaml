policy_version: "1.0"
project_id: ai-delivery-control-center
project_name: "AI Delivery Control Center"
repository: "C:/Projects/AI-Delivery-Control-Center"
domain_policy: "domains/enterprise-platform-policy.yaml"
trello_board: "<AI Delivery Control Center board URL>"
allowed_agents: [ai-product-orchestrator, ai-delivery-project-manager, ai-business-analyst, ai-system-analyst, ai-solution-architect, ai-backend-developer, ai-frontend-developer, ai-database-engineer, ai-data-metrics-engineer, ai-security-engineer, ai-qa-engineer, ai-test-automation-engineer, ai-trello-analyst, ai-release-manager, ai-technical-writer, ai-code-reviewer]
disabled_agents: []
security_notes:
  - "Corporate integrations, audit logs and permissions require security review."
llm_notes:
  - "Agent orchestration logs may include sensitive operational data; external LLM usage requires approval."
backend_frontend_data_notes:
  - "Audit log changes require security and data metrics review."
blocked_actions_extra:
  - "удалить audit log"
  - "изменить permissions без security review"
bug_rules:
  can_create_bug_reports: true
  can_create_trello_bug_cards: false
  bug_card_requires_parent_epic: true
  epic_card_must_track_open_bugs: true
  allowed_bug_lists: ["07 QA / проверка", "09 Заблокировано", "Hotfix"]
  required_bug_labels: ["Баг", "QA", "Enterprise", "Security", "Backend", "Frontend"]
  bug_id_format: "БАГ-ЭПИК-{epic_number}-{sequence}"
  requires_security_review_for_security_bug: true
  requires_release_review_for_release_blocker: true
test_automation_rules:
  owner: ai-test-automation-engineer
  qa_gate_owner: ai-qa-engineer
  can_modify_test_code: true
  can_modify_production_code: false
  allowed_test_types: [unit, integration, API, e2e, mocks, regression]
  bug_report_on_failed_automation: true
  cannot_close_bug_without_qa_verification: true
  cannot_change_scope: true
  ci_test_changes_require_devops_approval: true
