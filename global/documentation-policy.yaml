policy_version: "1.0"
owner_agent: ai-technical-writer
rules:
  - "Архитектурные решения фиксируются через ADR и owner ai-solution-architect."
  - "БТ формирует ai-business-analyst."
  - "ТЗ формирует ai-system-analyst."
  - "Пользовательские инструкции формирует ai-technical-writer."
  - "Документация должна быть на русском языке, если проект русскоязычный."
  - "Технические имена файлов, классов, агентов, skills и системных сущностей можно оставлять на английском."
  - "Technical plans for agents могут быть на английском, если это повышает качество работы agentic workers."
  - "User-facing summary всегда должен быть на русском языке."
  - "Если создан English technical plan, обязателен блок user_review_summary_ru."
  - "Документация должна содержать дату, статус, owner, scope, связанные эпики."
  - "Bug reports должны храниться или ссылаться из документации проекта, если project policy требует."
required_metadata:
  - date
  - status
  - owner
  - scope
  - related_epics
docs_only_rule:
  production_code_changes: blocked
dual_language_planning:
  english_technical_plans_allowed:
    - implementation_plan
    - architecture_plan
    - test_plan
    - test_automation_plan
    - QA_plan
    - release_plan
    - subagent_execution_plan
    - worker_task_plan
  russian_user_summary_required: true
  missing_russian_summary_status: NEEDS_USER_REVIEW_SUMMARY
  required_summary_block: user_review_summary_ru
